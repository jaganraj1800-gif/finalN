<div class="container py-5">
  <div class="employee-card">

    <div class="card-header-custom">
      <h2>Employee Registration</h2>
      <p>Create a new employee service record</p>
    </div>

    <form [formGroup]="employeeForm" (ngSubmit)="saveEmployee()">

      <div class="row">

        <div class="col-md-6 mb-3">
          <label class="form-label">
            Employee Name (English) <span class="required">*</span>
          </label>
          <input
            type="text"
            class="form-control"
            formControlName="employeeNameEnglish">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">
            Employee Name (Tamil) <span class="required">*</span>
          </label>
          <input
            type="text"
            class="form-control"
            formControlName="employeeNameTamil"
            (input)="transliterateTamil($event)"
            (blur)="onTamilBlur($event)">

          <small class="text-danger"
            *ngIf="employeeForm.get('employeeNameTamil')?.invalid &&
                   employeeForm.get('employeeNameTamil')?.touched">
            Tamil name is required.
          </small>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Employee Code</label>
          <input class="form-control" formControlName="employeeCode">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Designation</label>
          <select class="form-select" formControlName="designation">
            <option value="">Select Designation</option>
            <option *ngFor="let d of designationList" [value]="d">
              {{ d }}
            </option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Department</label>
          <input class="form-control" formControlName="department">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Date of Joining</label>
          <input
            type="date"
            class="form-control"
            formControlName="dateOfJoining">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Mobile Number</label>
          <input class="form-control" formControlName="mobileNumber">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" formControlName="email">
        </div>

        <div class="col-12 mb-3">
          <label class="form-label">Remarks</label>
          <textarea
            rows="4"
            class="form-control"
            formControlName="remarks">
          </textarea>
        </div>

        <div class="col-12 mb-4">
          <label class="form-label">Appointment Order (PDF)</label>
          <input
            type="file"
            class="form-control"
            accept=".pdf"
            (change)="onFileChange($event)">
        </div>

      </div>

      <div class="button-group">
        <button
          type="button"
          class="btn btn-outline-secondary"
          (click)="reset()">
          Reset
        </button>

        <button
          type="submit"
          class="btn btn-primary">
          Save Employee
        </button>
      </div>

    </form>

  </div>
</div>
